name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write  # Permissão para commitar os cards

    steps:
      - uses: actions/checkout@v4  # Necessário para acessar o repo
      
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}  # Use seu PAT, não GITHUB_TOKEN
        with:
          USERNAME: jotape2709
          THEME: tokyonight
          # Opcional: especificar branch para push
          BRANCH_NAME: "main"
          AUTO_PUSH: true
